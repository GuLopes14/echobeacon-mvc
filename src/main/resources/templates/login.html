<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>EchoBeacon - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
</head>
<body class="flex items-center justify-center min-h-screen bg-stone-950">
    <div class="w-96 p-8 rounded-lg shadow-lg bg-stone-900 text-center">
        <h1 class="text-3xl font-bold mb-6 text-white tracking-wide">ECHOBEACON</h1>
        <h2 class="text-xl mb-8 text-white">Entre para continuar</h2>
        <form>
            <div class="mb-4 text-left">
                <label class="block text-white text-lg mb-2" for="email">Email</label>
                <input class="w-full px-3 py-2 bg-stone-700 text-white rounded" id="email" type="email" placeholder="seu@email.com" required>
            </div>
            <div class="mb-8 text-left">
                <label class="block text-white text-lg mb-2" for="senha">Senha</label>
                <input class="w-full px-3 py-2 bg-stone-700 text-white rounded" id="senha" type="password" placeholder="********" required>
            </div>
            <button type="submit" class="w-full py-3 mb-4 rounded-full bg-lime-500 text-black font-bold text-lg hover:bg-lime-600 transition">ENTRAR</button>
            <a href="/register" class="w-full block py-2 rounded-full bg-lime-500 text-black font-bold text-sm hover:bg-lime-600 transition">É MEU PRIMEIRO ACESSO</a>
        </form>
        <div class="mt-6">
            <a href="/oauth2/authorization/github" class="text-white underline">Entrar com GitHub</a>
        </div>
    </div>
